name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ── Docs integrity ──────────────────────────────────────────────────────────
  docs:
    name: Docs checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Docs map check
        run: python scripts/check_docs_map.py
        continue-on-error: true   # remove once scripts/ land

      - name: Queue validate
        run: python scripts/queue_validate.py
        continue-on-error: true   # remove once scripts/ land

      - name: Repo self-audit
        run: python scripts/repo_self_audit.py
        continue-on-error: true   # remove once scripts/ land

      - name: Dead init-reference lint
        run: python scripts/check_init_refs.py
        continue-on-error: true   # remove once Q-110 lands

  # ── Lint & format ───────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check . --select E,F,W,I
        continue-on-error: true   # remove once apps/ land

      - name: Ruff format check
        run: ruff format --check .
        continue-on-error: true   # remove once apps/ land

  # ── Tests ───────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --dev
        continue-on-error: true   # remove once pyproject.toml lands

      - name: Run tests
        run: uv run pytest --tb=short
        continue-on-error: true   # remove once apps/ land

  # ── Security scan ───────────────────────────────────────────────────────────
  security:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for secret scanning

      - name: Detect secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
