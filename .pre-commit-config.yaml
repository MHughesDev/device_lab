# .pre-commit-config.yaml
# Local git hooks: whitespace, YAML/TOML/JSON checks, Ruff lint + format.
# Install: `pre-commit install` — run all: `pre-commit run --all-files`

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: no-commit-to-branch
        args: [--branch=main]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: queue-validate
        name: queue validate
        language: system
        entry: python3 scripts/queue_validate.py
        pass_filenames: false
        always_run: true

      - id: secret-scan
        name: secret scan
        language: system
        entry: python3 skills/security/secret-scanner.py --repo-root .
        pass_filenames: false
        always_run: true

      - id: rules-check
        name: rules check
        language: system
        entry: bash scripts/rules-check.sh
        pass_filenames: false
        files: ^\.cursor/rules/
